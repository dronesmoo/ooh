<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Virtual Tour</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
        }
        #panorama {
            width: 100%;
            height: 100vh;
        }
        #landing {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #landing h1 {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 2em;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        #enter-btn {
            position: absolute;
            bottom: 40%;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 2px solid white;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
        }
        #enter-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Hide loading elements */
        .pnlm-load-box,
        .pnlm-lbox,
        .pnlm-loading,
        .pnlm-load-button {
            display: none !important;
        }

        /* Hide default hotspot sprite and size the container */
        .pnlm-hotspot-base.hotspot-hallway,
        .pnlm-hotspot-base.hotspot-office,
        .pnlm-hotspot-base.hotspot-conference,
        .pnlm-hotspot-base.hotspot-waiting {
            background-image: none !important;
            width: 40px !important;
            height: 40px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            overflow: visible !important;
        }

        /* Icon styles */
        .hotspot-hallway::before,
        .hotspot-office::before,
        .hotspot-conference::before,
        .hotspot-waiting::before {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 30px;
            color: white;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        /* Room type icons */
        .hotspot-office::before  { content: "\f0b1"; }
        .hotspot-conference::before { content: "\f0c0"; }
        .hotspot-hallway::before { content: "\f062"; }
        .hotspot-waiting::before { content: "\f4b8"; }
        #nav-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.75);
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    z-index: 2;
}

.nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 8px 16px;
    color: white;
    font-size: 13px;
    cursor: pointer;
}

.nav-btn:hover {
    background: rgba(255,255,255,0.3);
}
    </style>
</head>
<body>

    <div id="landing">
        <h1>Seeds of Hope Counseling</h1>
        <button id="enter-btn" onclick="startTour()">Click to Start Tour</button>
    </div>

    <div id="panorama"></div>
    <div id="nav-bar"></div>
    <script src="pannellum.js"></script>
    <script>
        function preloadImages() {
            var urls = [
                'https://media.dronesmoo.com/seedsofhope/hall.JPG',
                'https://media.dronesmoo.com/seedsofhope/conferenceroom.JPG',
                'https://media.dronesmoo.com/seedsofhope/officeone.JPG',
                'https://media.dronesmoo.com/seedsofhope/officetwo.JPG',
                'https://media.dronesmoo.com/seedsofhope/officethree.JPG'
            ];
            urls.forEach(function(url) {
                var img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = url;
            });
        }
        function buildJumpMenu(viewer) {
    var menu = document.getElementById('jump-menu');
    menu.innerHTML = '';
    var config = viewer.getConfig();
    var scenes = config.scenes || {};

    Object.keys(scenes).forEach(function(sceneId) {
        var btn = document.createElement('button');
        btn.className = 'jump-btn';
        // Convert 'officeone' to 'Office one' etc
        btn.textContent = sceneId
            .replace(/([a-z])([A-Z])/g, '$1 $2')
            .replace(/^./, function(c) { return c.toUpperCase(); });
        btn.onclick = function() {
            viewer.loadScene(sceneId);
            toggleJumpMenu();
        };
        menu.appendChild(btn);
    });
}
        function toggleJumpMenu() {
    var menu = document.getElementById('jump-menu');
    menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
}
        function updateNavBar(viewer) {
    var config = viewer.getConfig();
    var hotSpots = config.hotSpots || [];
    var navBar = document.getElementById('nav-bar');
    navBar.innerHTML = '';

    hotSpots.forEach(function(spot) {
        var btn = document.createElement('button');
        btn.className = 'nav-btn ' + spot.cssClass;
        btn.innerHTML = '<span>' + spot.text + '</span>';
        btn.onclick = function() {
            viewer.loadScene(spot.sceneId);
        };
        navBar.appendChild(btn);
    });
}
        function startTour() {
            document.getElementById('landing').style.display = 'none';
            var viewer = pannellum.viewer('panorama', {
                default: {
                    firstScene: 'waitingroom',
                    hfov: 120,
                    autoLoad: true,
                    showControls: true,
                    sceneFadeDuration: 1000
                },
                scenes: {
                    waitingroom: {
                        type: 'equirectangular',
                        panorama: 'https://media.dronesmoo.com/seedsofhope/waitingroom.JPG',
                        hotSpots: [
                            {
                                pitch: 0,
                                yaw: 0,
                                type: 'scene',
                                text: 'Go to Hallway',
                                sceneId: 'hall',
                                cssClass: 'hotspot-hallway',
                                autoLoad: true
                            }
                        ]
                    },
                    hall: {
                        type: 'equirectangular',
                        panorama: 'https://media.dronesmoo.com/seedsofhope/hall.JPG',
                        hotSpots: [
                            {
                                pitch: 0,
                                yaw: -180,
                                text: 'Back to Waiting Room',
                                type: 'scene',
                                cssClass: 'hotspot-waiting',
                                sceneId: 'waitingroom'
                            },
                            {
                                pitch: 0,
                                yaw: 6,
                                text: 'Office 3',
                                type: 'scene',
                                cssClass: 'hotspot-office',
                                sceneId: 'officethree'
                            },
                            {
                                pitch: -5,
                                yaw: 10,
                                text: 'Office 2',
                                type: 'scene',
                                cssClass: 'hotspot-office',
                                sceneId: 'officetwo'
                            },
                            {
                                pitch: 0,
                                yaw: 140,
                                text: 'Office 1',
                                type: 'scene',
                                cssClass: 'hotspot-office',
                                sceneId: 'officeone'
                            },
                            {
                                pitch: 0,
                                yaw: 160,
                                text: 'Conference Room',
                                type: 'scene',
                                cssClass: 'hotspot-conference',
                                sceneId: 'conferenceroom'
                            }
                        ]
                    },
                    conferenceroom: {
                        type: 'equirectangular',
                        panorama: 'https://media.dronesmoo.com/seedsofhope/conferenceroom.JPG',
                        hotSpots: [
                            {
                                pitch: 0,
                                yaw: -7.26,
                                type: 'scene',
                                text: 'Go to Hallway',
                                cssClass: 'hotspot-hallway',
                                sceneId: 'hall'
                            }
                        ]
                    },
                    officeone: {
                        type: 'equirectangular',
                        panorama: 'https://media.dronesmoo.com/seedsofhope/officeone.JPG',
                        hotSpots: [
                            {
                                pitch: 0,
                                yaw: 62.5,
                                type: 'scene',
                                text: 'Go to Hallway',
                                cssClass: 'hotspot-hallway',
                                sceneId: 'hall'
                            }
                        ]
                    },
                    officetwo: {
                        type: 'equirectangular',
                        panorama: 'https://media.dronesmoo.com/seedsofhope/officetwo.JPG',
                        hotSpots: [
                            {
                                pitch: 0,
                                yaw: -65.38,
                                type: 'scene',
                                text: 'Go to Hallway',
                                cssClass: 'hotspot-hallway',
                                sceneId: 'hall'
                            }
                        ]
                    },
                    officethree: {
                        type: 'equirectangular',
                        panorama: 'https://media.dronesmoo.com/seedsofhope/officethree.JPG',
                        hotSpots: [
                            {
                                pitch: 0,
                                yaw: 51.3,
                                type: 'scene',
                                text: 'Go to Hallway',
                                cssClass: 'hotspot-hallway',
                                sceneId: 'hall'
                            }
                        ]
                    }
                }
            });

            viewer.on('load', function() {
                preloadImages();
                updateNavBar(viewer);
            });
            viewer.on('scenechange', function() {
    updateNavBar(viewer);
});
        }
    </script>

</body>
</html>
