<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Virtual Tour</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        /* Base style for all hotspots */
.pnlm-hotspot.pnlm-scene {
    background-image: none;
}

/* Shared icon styles */
[class^="hotspot-"]::before {
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    font-size: 24px;
    color: white;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
        

/* Room types */
.hotspot-office::before { content: "\f0b1"; }
.hotspot-conference::before { content: "\f0c0"; }
.hotspot-hallway::before { content: "\f062"; }
.hotspot-waiting::before { content: "\f4b8"; }
        .pnlm-hotspot.pnlm-scene {
    background-image: none;
        }    
        body {
            margin: 0;
            padding: 0;
            background: #000;
        }
        #panorama {
            width: 100%;
            height: 100vh;
        }
        #landing {
            position: fixed;
            width: 100%;
            height: 100%;
           
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #landing h1 {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 2em;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        #enter-btn {
            position: absolute;
            bottom: 40%;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 2px solid white;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
        }
        .custom-hotspot {
    font-size: 24px;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}
        #enter-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="landing">
        <h1>Seeds of Hope Counseling</h1>
        <button id="enter-btn" onclick="startTour()">Click to Start Tour</button>
    </div>

    <div id="panorama"></div>

    <script src="pannellum.js"></script>
<script>
    function preloadImages() {
        var urls = [
            'https://media.dronesmoo.com/seedsofhope/hall.JPG',
            'https://media.dronesmoo.com/seedsofhope/conferenceroom.JPG',
            'https://media.dronesmoo.com/seedsofhope/officeone.JPG',
            'https://media.dronesmoo.com/seedsofhope/officetwo.JPG',
            'https://media.dronesmoo.com/seedsofhope/officethree.JPG'
        ];
        urls.forEach(function(url) {
            var img = new Image();
            img.src = url;
        });
    }

    function startTour() {
        document.getElementById('landing').style.display = 'none';
        var viewer = pannellum.viewer('panorama', {
            default: {
                firstScene: 'waitingroom',
                hfov: 120,
                autoLoad: true,
                showControls: true
            },
         scenes: {
         waitingroom: {
            type: 'equirectangular',
            panorama: 'https://media.dronesmoo.com/seedsofhope/waitingroom.JPG',
     
            hotSpots: [
                {
                    pitch: 0,
                    yaw: 0,
                    type: 'scene',
                    text: 'Go to Hallway',
                    sceneId: 'hall',
                    cssClass: 'hotspot-hallway',
                    autoLoad: true,
                   
                }
            ]
        },
        hall: {
            type: 'equirectangular',
            panorama: 'https://media.dronesmoo.com/seedsofhope/hall.JPG',
            hotSpots: [
                {
                    pitch: 0,
                    yaw: -180,
                    text: 'Back to Waiting Room',
                    type: 'scene',
                    cssClass: 'hotspot-waiting',
                    sceneId: 'waitingroom'
                },
                {
                    pitch: 0,
                    yaw: 6,
                    text: 'Office 3',
                    type: 'scene',
                    cssClass: 'hotspot-office',
                    sceneId: 'officethree'
                },
                {
                    pitch: -5,
                    yaw: 10,
                    text: 'Office 2',
                    type: 'scene',
                    cssClass: 'hotspot-office',
                    sceneId: 'officetwo'
                },
                {
                    pitch: 0,
                    yaw: 140,
                    text: 'Office 1',
                    type: 'scene',
                    cssClass: 'hotspot-office',
                    sceneId: 'officeone'
                },
                {
                    pitch: 0,
                    yaw: 160,
                    text: 'Conference Room',
                    type: 'scene',
                    cssClass: 'hotspot-conference',
                    sceneId: 'conferenceroom'
                }
            ]
            },
            conferenceroom: {
            type: 'equirectangular',
            panorama: 'https://media.dronesmoo.com/seedsofhope/conferenceroom.JPG',
            hotSpots: [
                {
                    pitch: 0,
                    yaw: -7.26,
                    type: 'scene',
                    text: 'Go to Hallway',
                    cssClass: 'hotspot-hallway',
                    sceneId: 'hall'
                }
            ]
        },
            officeone: {
            type: 'equirectangular',
            panorama: 'https://media.dronesmoo.com/seedsofhope/officeone.JPG',
            hotSpots: [
                {
                    pitch: 0,
                    yaw: 62.5,
                    type: 'scene',
                    text: 'Go to Hallway',
                    cssClass: 'hotspot-hallway',
                    sceneId: 'hall'
                }
            ]
        },
            officetwo: {
            type: 'equirectangular',
            panorama: 'https://media.dronesmoo.com/seedsofhope/officetwo.JPG',
            hotSpots: [
                {
                    pitch: 0,
                    yaw: -65.38,
                    type: 'scene',
                    text: 'Go to Hallway',
                    cssClass: 'hotspot-hallway',
                    sceneId: 'hall'
                }
            ]
        },
            officethree: {
            type: 'equirectangular',
            panorama: 'https://media.dronesmoo.com/seedsofhope/officethree.JPG',
            hotSpots: [
                {
                    pitch: 0,
                    yaw: 51.3,
                    type: 'scene',
                    text: 'Go to Hallway',
                    cssClass: 'hotspot-hallway',
                    sceneId: 'hall'
                }
            ]
        }
    }
});
         viewer.on('load', function() {
            preloadImages();
        });
    }
</script>

</body>
</html>
